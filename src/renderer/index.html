<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';" />
  <title>Pane</title>
  <link rel="stylesheet" href="styles/index.css" />
</head>
<body>
  <div id="toolbar">
    <div class="cluster left">
      <button class="icon-btn" id="back" title="Back (Alt+Left)" disabled aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="icon-btn" id="forward" title="Forward (Alt+Right)" disabled aria-label="Forward">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="icon-btn" id="reload" title="Reload (Ctrl+R)" aria-label="Reload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
    </div>

    <div class="address-wrap">
      <div class="address-pill" id="pill">
        <span class="status-glyph" id="statusGlyph" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </span>
        <input id="address" type="text" spellcheck="false" autocomplete="off" autocapitalize="off"
               placeholder="Search or enter address" />
      </div>
    </div>

    <div class="cluster right">
      <button class="icon-btn" id="devtools" title="DevTools (Ctrl+Shift+I)" aria-label="Toggle DevTools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 8l-4 4 4 4"/><path d="M15 8l4 4-4 4"/></svg>
      </button>
    </div>

    <div id="loadingbar"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
