<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
    #h { position: relative; width: 100%; height: 100%; cursor: col-resize; }
    body[data-o="row"] #h { cursor: row-resize; }
    /* a hairline of light centered on the gutter; brightens on hover/drag (DESIGN: border-as-light) */
    #h::after {
      content: ""; position: absolute; background: rgba(255, 255, 255, 0.09);
      transition: background 150ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    body:not([data-o="row"]) #h::after { top: 0; bottom: 0; left: 50%; width: 1px; transform: translateX(-50%); }
    body[data-o="row"] #h::after { left: 0; right: 0; top: 50%; height: 1px; transform: translateY(-50%); }
    #h:hover::after, #h.drag::after { background: rgba(255, 255, 255, 0.16); }
  </style>
</head>
<body>
  <div id="h"></div>
  <script>
    const h = document.getElementById('h');
    window.paneSplitter.onOrientation((o) => { document.body.dataset.o = o; });
    let dragging = false;
    h.addEventListener('pointerdown', (e) => {
      dragging = true; h.classList.add('drag');
      try { h.setPointerCapture(e.pointerId); } catch {}
      e.preventDefault();
    });
    h.addEventListener('pointermove', (e) => { if (dragging) window.paneSplitter.drag(e.screenX, e.screenY); });
    const end = (e) => {
      if (!dragging) return;
      dragging = false; h.classList.remove('drag');
      try { h.releasePointerCapture(e.pointerId); } catch {}
      window.paneSplitter.end();
    };
    h.addEventListener('pointerup', end);
    h.addEventListener('pointercancel', end);
  </script>
</body>
</html>
